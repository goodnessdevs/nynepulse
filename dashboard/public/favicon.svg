<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132218"/>
      <stop offset="100%" stop-color="#060A06"/>
    </linearGradient>
    <linearGradient id="ng" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DCFA8"/>
      <stop offset="100%" stop-color="#2D5040"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4D8A6E"/>
      <stop offset="100%" stop-color="#1A2E1A"/>
    </linearGradient>
    <radialGradient id="dot" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#7DCFA8"/>
      <stop offset="100%" stop-color="#2D5040"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="url(#border)" stroke-width="0.8"/>

  <!-- Correct N: left vertical | diagonal top-left→bottom-right | right vertical -->
  <path d="M 7,25 L 7,7 L 25,25 L 25,7"
    fill="none" stroke="url(#ng)"
    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pulse dot accent -->
  <circle cx="25" cy="25" r="3.5" fill="#0F1A0C"/>
  <circle cx="25" cy="25" r="1.8" fill="url(#dot)"/>
</svg>