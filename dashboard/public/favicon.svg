<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0A130A"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="#3D6B55" stroke-width="1"/>

  <!-- Geometric N mark -->
  <line x1="8" y1="24" x2="8" y2="8"
    stroke="#5CAF85" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8" y1="8" x2="16" y2="17"
    stroke="#5CAF85" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="17" x2="24" y2="8"
    stroke="#5CAF85" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="8" x2="24" y2="24"
    stroke="#5CAF85" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Pulse dot accent -->
  <circle cx="24" cy="24" r="3.5" fill="#1E3B2A"/>
  <circle cx="24" cy="24" r="1.8" fill="#5CAF85"/>
</svg>